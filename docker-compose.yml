services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://codeforge:codeforge@postgres:5432/codeforge
      DATABASE_SYNC_URL: postgresql://codeforge:codeforge@postgres:5432/codeforge
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      DOCKER_HOST: unix:///var/run/docker.sock
      SANDBOX_IMAGE: codeforge-sandbox-python:latest
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_SIMPLE_MODEL: ${DEFAULT_SIMPLE_MODEL:-openai/gpt-4o-mini}
      DEFAULT_COMPLEX_MODEL: ${DEFAULT_COMPLEX_MODEL:-openai/gpt-4o-mini}
      COMPLEXITY_SIMPLE_THRESHOLD: ${COMPLEXITY_SIMPLE_THRESHOLD:-0.3}
      COMPLEXITY_COMPLEX_THRESHOLD: ${COMPLEXITY_COMPLEX_THRESHOLD:-0.4}
      MAX_REPAIR_RETRIES: ${MAX_REPAIR_RETRIES:-3}
      SECRET_KEY: ${SECRET_KEY:-codeforge-dev-secret-2024}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codeforge
      POSTGRES_PASSWORD: codeforge
      POSTGRES_DB: codeforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config", "/etc/otel/config.yml"]
    volumes:
      - ./docker/otel/otel-collector-config.yml:/etc/otel/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  pgdata:
  ollama_data:
