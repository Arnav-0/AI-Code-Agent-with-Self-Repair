name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[dev]'
        working-directory: backend

      - name: Ruff lint
        run: python -m ruff check app/ tests/
        working-directory: backend

      - name: MyPy type check
        run: python -m mypy app/ --ignore-missing-imports --no-error-summary
        working-directory: backend

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[dev]'
        working-directory: backend

      - name: Run unit tests
        run: |
          mkdir -p results
          python -m pytest tests/unit -v --tb=short \
            --junitxml=results/unit.xml \
            --cov=app --cov-report=xml:results/coverage.xml \
            --cov-report=term-missing
        working-directory: backend

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: backend/results/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: codeforge
          POSTGRES_PASSWORD: codeforge
          POSTGRES_DB: codeforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[dev]'
        working-directory: backend

      - name: Run integration tests
        run: |
          python -m pytest tests/integration -v --tb=short \
            --junitxml=results/integration.xml
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://codeforge:codeforge@localhost:5432/codeforge_test
          DATABASE_SYNC_URL: postgresql://codeforge:codeforge@localhost:5432/codeforge_test
          REDIS_URL: redis://localhost:6379/0

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: backend/results/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: codeforge
          POSTGRES_PASSWORD: codeforge
          POSTGRES_DB: codeforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[dev]'
        working-directory: backend

      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e -v --tb=short \
            --junitxml=results/e2e.xml
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://codeforge:codeforge@localhost:5432/codeforge_test
          DATABASE_SYNC_URL: postgresql://codeforge:codeforge@localhost:5432/codeforge_test
          REDIS_URL: redis://localhost:6379/0

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 7
